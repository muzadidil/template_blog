<style>
.proyek-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 32px;
  align-items: start;
}
.proyek-sidebar {
  position: sticky;
  top: 100px;
}
.proyek-sidebar-title {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #999;
  margin-bottom: 12px;
}
.dark .proyek-sidebar-title { color: #666; }
#proyek-filter {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.proyek-filter-btn {
  text-align: left;
  border: none;
  background: transparent;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  color: #555;
  cursor: pointer;
  transition: background .15s ease, color .15s ease;
}
.dark .proyek-filter-btn { color: #999; }
.proyek-filter-btn:hover { background: #f3f4f6; }
.dark .proyek-filter-btn:hover { background: #1f1f1f; }
.proyek-filter-btn.is-active {
  background: #111;
  color: #fff;
  font-weight: 600;
}
.dark .proyek-filter-btn.is-active { background: #fff; color: #111; }
#proyek-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.proyek-card {
  background: #fff;
  border: 1px solid #e8eaed;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
}
.dark .proyek-card {
  background: #1a1a1a;
  border-color: #2a2a2a;
}
.proyek-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 28px rgba(0,0,0,0.1);
}
.dark .proyek-card:hover {
  box-shadow: 0 10px 28px rgba(0,0,0,0.4);
}
.proyek-card-img {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  display: block;
}
.proyek-card-placeholder {
  width: 100%;
  aspect-ratio: 16/10;
  background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
}
.proyek-card-body {
  padding: 14px 16px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.proyek-card-cat {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: #999;
  margin-bottom: 6px;
}
.dark .proyek-card-cat { color: #666; }
.proyek-card-title {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.4;
  color: #111;
  margin-bottom: 8px;
}
.dark .proyek-card-title { color: #eee; }
.proyek-card-desc {
  font-size: 12px;
  color: #777;
  line-height: 1.6;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.dark .proyek-card-desc { color: #666; }
.proyek-card-date {
  font-size: 11px;
  color: #bbb;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid #f0f0f0;
}
.dark .proyek-card-date {
  color: #555;
  border-top-color: #222;
}
/* Skeleton */
.proyek-skeleton {
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #e8eaed;
}
.dark .proyek-skeleton { border-color: #2a2a2a; }
.sk-img {
  width: 100%;
  aspect-ratio: 16/10;
  background: #f0f0f0;
  animation: sk-pulse 1.4s ease-in-out infinite;
}
.dark .sk-img { background: #222; }
.sk-body { padding: 14px 16px 16px; }
.sk-line {
  height: 10px;
  border-radius: 5px;
  background: #f0f0f0;
  margin-bottom: 8px;
  animation: sk-pulse 1.4s ease-in-out infinite;
}
.dark .sk-line { background: #222; }
.sk-line.short { width: 50%; }
.sk-line.med { width: 80%; }
@keyframes sk-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
/* Header */
.proyek-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
}
.proyek-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #f3f4f6;
  color: #555;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
}
.dark .proyek-badge {
  background: #1f1f1f;
  color: #888;
}
.proyek-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #22c55e;
  display: inline-block;
  animation: blink 2s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.proyek-empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: #aaa;
  font-size: 14px;
}
/* Responsive */
@media (max-width: 900px) {
  .proyek-layout { grid-template-columns: 1fr; }
  .proyek-sidebar {
    position: static;
    display: flex;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  #proyek-filter { flex-direction: row; }
  .proyek-filter-btn { white-space: nowrap; }
  #proyek-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 480px)  { #proyek-grid { grid-template-columns: 1fr; } }
</style>

<div class="proyek-layout">
  <aside class="proyek-sidebar">
    <div class="proyek-sidebar-title">Filter</div>
    <div id="proyek-filter">
      <button type="button" class="proyek-filter-btn is-active" data-filter="">Semua</button>
    </div>
  </aside>

  <div>
    <div class="proyek-header">
      <div id="proyek-badge" class="proyek-badge">
        <span class="proyek-dot"></span>
        <span id="proyek-count">Memuat...</span>
      </div>
    </div>

    <div id="proyek-grid">
      <!-- Skeleton 6 kartu -->
      <div class="proyek-skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line short"></div><div class="sk-line med"></div><div class="sk-line"></div></div></div>
      <div class="proyek-skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line short"></div><div class="sk-line med"></div><div class="sk-line"></div></div></div>
      <div class="proyek-skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line short"></div><div class="sk-line med"></div><div class="sk-line"></div></div></div>
      <div class="proyek-skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line short"></div><div class="sk-line med"></div><div class="sk-line"></div></div></div>
      <div class="proyek-skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line short"></div><div class="sk-line med"></div><div class="sk-line"></div></div></div>
      <div class="proyek-skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line short"></div><div class="sk-line med"></div><div class="sk-line"></div></div></div>
    </div>
  </div>
</div>
